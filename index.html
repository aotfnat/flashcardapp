<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FlashCards</title>
<link rel="manifest" href="manifest.json">

<style>
body {
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#111;
  color:white;
  text-align:center;
  overflow-x:hidden;
}

.bottom-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  padding: 16px 20px;
  background: #111;
  border-top: 1px solid #333;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  z-index: 100;
  box-sizing: border-box;
  padding-bottom: env(safe-area-inset-bottom, 16px);
}

button {
  padding: 16px;
  margin: 0;               /* remove previous margin */
  font-size: 17px;
  border-radius: 12px;
  width: 100%;
  max-width: 420px;
  box-sizing: border-box;
  touch-action: manipulation;   /* better touch response */
}

@media (min-width: 400px) {
  .bottom-bar {
    flex-direction: row;
    justify-content: center;
    gap: 16px;
    padding: 16px 24px;
  }
  
  .bottom-bar button {
    width: auto;
    min-width: 140px;
    flex: 1;
    max-width: 220px;
  }
}



#showBtn { background:#444; color:white; }
#correctBtn { background:#1e8e3e; display:none; }
#incorrectBtn { background:#c62828; display:none; }

.main-content-area {
  min-height: 100vh;
  padding: 60px 20px 180px;   /* top for menu button, bottom for bar */
  box-sizing: border-box;
}

.main-content-area,
#card,
#card * {
  pointer-events: auto;           /* default anyway */
}

#card {
  position: relative;             /* creates new stacking context */
  z-index: 10;                    /* low enough not to cover fixed buttons */
}

#card {
  margin: 80px 20px 20px;
  font-size: 22px;
  min-height: 120px;
  
  /* Core changes */
  text-align: center;           /* centers inline content (including the inner block) */
  line-height: 1.45;
  
  /* Let the inner content take only the width it needs */
  display: flex;
  justify-content: center;      /* horizontal centering */
  align-items: center;          /* vertical centering — optional but nice */
}

#card > div.inner {             /* ← we'll wrap the text in a div */
  text-align: left;             /* left-align the actual lines */
  max-width: 90%;               /* or 85% / 480px / whatever feels best */
  width: fit-content;           /* shrinks to content width, but won't exceed max-width */
}

img {
  max-width:100%;
  margin-top:10px;
  border-radius:8px;
}

.top-icon-btn {
  position: fixed;
  top: calc(10px + env(safe-area-inset-top));
  width: 44px;
  height: 44px;
  font-size: 28px;
  line-height: 44px;
  text-align: center;
  background: none;
  color: white;
  border: none;
  border-radius: 50%;
  padding: 0;
  margin: 0;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
}

.top-icon-btn:hover,
.top-icon-btn:active {
  background: rgba(255, 255, 255, 0.15);
  transform: scale(1.08);
}

.menuBtn {
  right: calc(16px + env(safe-area-inset-right));
  z-index: 2000;
}

.backFlipBtn {
  left: calc(16px + env(safe-area-inset-left));
  z-index: 1999;
}

/* Hide back button with sidebar */
.sidebar.open ~ .backFlipBtn {
  opacity: 0;
  pointer-events: none;
  visibility: hidden;
}

.card-counter {
  position: fixed;
  top: calc(10px + env(safe-area-inset-top));
  right: calc(70px + env(safe-area-inset-right));   /* space for menu button + margin */
  z-index: 1995;                                     /* below menuBtn but above content */

  font-size: 18px;
  font-weight: 600;
  color: #aaa;
  background: rgba(0,0,0,0.4);
  padding: 6px 12px;
  border-radius: 20px;
  min-width: 60px;
  text-align: center;
  line-height: 1.3;
  pointer-events: none;                              /* so it doesn't block taps */
  transition: opacity 0.25s;
}

.sidebar.open ~ .card-counter {
  opacity: 0;
}


.closeBtn {
  position: absolute;
  top: 10px;
  right: 12px;
  background: none;
  border: none;
  color: #ccc;
  font-size: 36px;
  width: 44px;         
  height: 44px;
  line-height: 44px;    /* vertically centers the × inside the button */
  text-align: center;   /* horizontally centers the × inside the button */
  padding: 0;
  margin: 0;
  cursor: pointer;
  z-index: 10;
}

.closeBtn:hover {
  color: white;
}

.sidebar {
  position:fixed;
  top:0;
  left:-260;
  width:260px;
  height:100%;
  background:#222;
  transform:translateX(-100%);
  transition:transform .3s ease;
  padding:20px;
  box-sizing:border-box;
  overflow-y:auto;
  z-index:1000;
}

.sidebar.open { transform:translateX(0); }

input, textarea, select {
  width:100%;
  margin:5px 0;
  padding:8px;
  border-radius:6px;
  border:none;
}

.deckItem {
  padding: 10px 12px;
  cursor: pointer;
  border-radius: 8px;
  margin: 4px 0;
  transition: all 0.15s ease;
}

.deckItem:hover {
  background: #333;
}

.deckItem.active {
  background: #444;
  color: #8bc34a;           /* light green for success/active feel */
  font-weight: bold;
  border-left: 4px solid #8bc34a;
  padding-left: 8px;        /* compensate for border width */
}

.deckItem.done {
  color: #66bb6a;
}

.deckItem.done::after {
  content: " ✔";
  color: #8bc34a;
}

.deckItem.done.active {
  background: #2e7d32;      /* darker green when both done + active */
  border-left-color: #a5d6a7;
}

.collapsible-section {
  margin: 12px 0;
}

.collapsible-header {
  margin: 0;
  padding: 12px 16px;
  background: #333;
  border-radius: 8px;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.collapsible-header:hover {
  background: #444;
}

.collapsible-header::after {
  content: "▾";               /* down arrow when collapsed */
  font-size: 1.2em;
  transition: transform 0.25s ease;
}

.collapsible-section.open .collapsible-header::after {
  transform: rotate(180deg);   /* up arrow when expanded */
}

.collapsible-content {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.3s ease-out, padding 0.3s ease-out;
  padding: 0 16px;
  background: #222;
  border-radius: 0 0 8px 8px;
}

.collapsible-section.open .collapsible-content {
  max-height: 2000px;          /* large enough for many cards + editor */
  padding: 16px;
}

.editor-buttons {
  display: flex;
  flex-direction: column;        /* stack vertically */
  gap: 10px;                     /* space between buttons */
  margin-top: 16px;
}

.editor-buttons button {
  width: 100%;                   /* full width of the sidebar content area */
  padding: 14px;
  font-size: 17px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  touch-action: manipulation;
}

/* Specific colors - override your global button styles if needed */
.editor-buttons button:nth-child(1) {  /* Save */
  background: #1e8e3e;           /* green */
  color: white;
}

.editor-buttons button:nth-child(2) {  /* Cancel */
  background: #555;              /* neutral gray */
  color: white;
}

.editor-buttons button:nth-child(3) {  /* Delete */
  background: #c62828;           /* red */
  color: white;
}

.editor-buttons button:hover {
  opacity: 0.92;
}

</style>
</head>
<body>

<button class="top-icon-btn menuBtn" onclick="toggleMenu()">☰</button>
<div id="cardCounter" class="card-counter">– / –</div>
<button class="top-icon-btn" id="backFlipBtn" onclick="handleBackOrFlip()">←</button>


<div class="sidebar" id="sidebar">
  <button class="closeBtn" onclick="toggleMenu()">×</button>

  <h3>Decks</h3>
  <div id="deckList"></div>

  <button onclick="markDone()">Mark Done ✔</button>
  <button onclick="restartDeck()">Restart Deck</button>
  <button onclick="toggleMode()">Toggle Shuffle</button>
  <button onclick="addDeck()">Add Deck</button>
  <button onclick="deleteDeck()">Delete Deck</button>

  <hr>

  <h3>Import CSV</h3>
  <input type="file" id="csvFile" accept=".csv" multiple>
  <button onclick="importCSV()">Import</button>
 
  <h3>Export Deck</h3>
  <button onclick="exportCurrentDeck()">Export Current Deck as CSV</button>

  <hr>

  <h3>Add Card</h3>
  <textarea id="newQ" placeholder="Question"></textarea>
  <textarea id="newA" placeholder="Answer"></textarea>
  <input type="file" id="newImg" accept="image/*">
  <button onclick="addCard()">Add Card</button>

  <hr>

  <div class="collapsible-section">
    <h3 class="collapsible-header" onclick="toggleEditSection()">Edit Cards ▾</h3>
  
    <div class="collapsible-content" id="editSection">
      <div id="cardList"></div>
      <div id="editor" style="display:none;">
        <textarea id="editQ" placeholder="Question"></textarea>
        <textarea id="editA" placeholder="Answer"></textarea>
        <input type="file" id="editImg" accept="image/*">
      
        <div class="editor-buttons">
          <button onclick="saveEdit()">Save</button>
          <button onclick="cancelEdit()">Cancel</button>
          <button onclick="deleteCard()">Delete</button>
        </div>
      </div>
    </div>
  </div>

</div>


<div class="main-content-area">
  <div id="card">Tap “Show Question” to begin</div>
</div>

<div class="bottom-bar">
  <button id="showBtn" onclick="handleShow()">Show Question</button>
  <button id="correctBtn" onclick="grade(true)">Correct</button>
  <button id="incorrectBtn" onclick="grade(false)">Incorrect</button>
  <button id="markDoneBtn" onclick="markDeckDone()" style="display:none; background:#2e7d32;">Mark Done ✔</button>
</div>

<script>
let data = JSON.parse(localStorage.getItem("studyData")) || {decks:{}};
let currentDeck = null;
let currentIndex = 0;
let showingAnswer = false;
let firstShow = true;
let repeatQueue = [];
let editingIndex = null;

function save(){
  localStorage.setItem("studyData", JSON.stringify(data));
}

function nl2br(str) {
  if (!str) return '';
  // First escape HTML (prevent <script> etc.), then convert newlines
  return str
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\n/g, '<br>');
}

function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("open");
}

function handleBackOrFlip() {
  if (!currentDeck) return;

  const showBtn = document.getElementById("showBtn");
  const correctBtn = document.getElementById("correctBtn");
  const incorrectBtn = document.getElementById("incorrectBtn");

  console.log("Back/Flip tapped → showingAnswer:", showingAnswer, "index:", currentIndex);

  if (showingAnswer || correctBtn.style.display !== "none") {
    // Flip back to question (most common case)
    showQuestion();
    showBtn.style.display = "block";
    showBtn.innerText = "Show Answer";
    correctBtn.style.display = "none";
    incorrectBtn.style.display = "none";
    showingAnswer = false;
    return;
  }

  // Otherwise: go previous if possible
  if (currentIndex > 0) {
    currentIndex--;
    showQuestion();
    showBtn.style.display = "block";
    showBtn.innerText = "Show Answer";
    correctBtn.style.display = "none";
    incorrectBtn.style.display = "none";
    showingAnswer = false;
  }
  // else: first card + question showing → do nothing
}

function updateBackButton() {
  const btn = document.getElementById("backFlipBtn");
  if (!currentDeck) {
    btn.style.display = "none";
    return;
  }
  btn.style.display = "block";

  // Enable always when answer showing, or when not on first card
  const shouldEnable = showingAnswer || currentIndex > 0;
  btn.disabled = !shouldEnable;
  btn.style.opacity = shouldEnable ? "1" : "0.4";
}

function updateCardCounter() {
  const counter = document.getElementById("cardCounter");
  if (!currentDeck || !data.decks[currentDeck]) {
    counter.textContent = "– / –";
    counter.style.opacity = "0.3";
    return;
  }

  const deck = data.decks[currentDeck];
  const total = deck.cards.length;
  const current = total > 0 ? currentIndex + 1 : 0;  // 1-based for user-friendliness

  counter.textContent = `${current} / ${total}`;
  counter.style.opacity = "1";
}

function renderDecks() {
  const list = document.getElementById("deckList");
  list.innerHTML = "";

  Object.keys(data.decks).forEach(name => {
    const div = document.createElement("div");
    div.textContent = name;
    div.className = "deckItem";

    // Add classes based on state
    if (data.decks[name].done) {
      div.classList.add("done");
    }
    if (name === currentDeck) {
      div.classList.add("active");
    }

    const cardCount = data.decks[name].cards.length;
    div.textContent = `${name} (${cardCount})`;

    div.onclick = () => {
      currentDeck = name;
      updateBackButton();
      updateCardCounter();
      startSession();
      toggleMenu();           // optional: close sidebar after selection
      renderDecks();          // ← re-render to update highlight
      renderCardList();
    };

    list.appendChild(div);
  });
}

function renderCardList() {
  const list = document.getElementById("cardList");
  list.innerHTML = "";

  if (!currentDeck) {
    list.innerHTML = "<p style='color:#888;'>Select a deck first</p>";
    return;
  }

  const deck = data.decks[currentDeck];
  if (deck.cards.length === 0) {
    list.innerHTML = "<p style='color:#888;'>No cards yet</p>";
    return;
  }

  deck.cards.forEach((card, index) => {
    const item = document.createElement("div");
    item.className = "deckItem";  // reuse style for consistency
    item.style.padding = "8px 12px";
    item.style.whiteSpace = "nowrap";
    item.style.overflow = "hidden";
    item.style.textOverflow = "ellipsis";

    // Show first 40 chars of question + image indicator
    let preview = card.q.substring(0, 40);
    if (card.q.length > 40) preview += "...";
    if (card.img) preview += " [img]";

    item.textContent = preview || "(empty question)";

    item.onclick = () => {
      editingIndex = index;
      document.getElementById("editQ").value = card.q;
      document.getElementById("editA").value = card.a;
      // Image can't be pre-filled easily — we only allow replacing
      document.getElementById("editor").style.display = "block";
      // Optional: scroll to editor
      document.getElementById("editor").scrollIntoView({ behavior: "smooth" });
    };

    list.appendChild(item);
  });
}

function addDeck() {
  const name = prompt("Deck name?");
  if (!name) return;

  // Initialize the deck and store a copy of the original cards
  const newDeck = {
    cards: [],
    originalCards: [],
    mode: "sequential",
    done: false,
    completed: false, // Track completion state
  };

  data.decks[name] = newDeck;
  save();
  renderDecks();
}

function deleteDeck(){
  if(!currentDeck) return;
  if(confirm("Delete deck?")){
    delete data.decks[currentDeck];
    currentDeck=null;
    save();
    renderDecks();
  }
}

function markDone(){
  if(!currentDeck) return;
  data.decks[currentDeck].done=!data.decks[currentDeck].done;
  save();
  renderDecks();
}

function markDeckDone() {
  if (!currentDeck) return;
  
  // Toggle the done state (same logic as sidebar button)
  data.decks[currentDeck].done = !data.decks[currentDeck].done;
  save();
  
  // Refresh UI
  renderDecks();
  
  // Optional: give feedback
  const btn = document.getElementById("markDoneBtn");
  if (data.decks[currentDeck].done) {
    btn.innerText = "Done! ✔";
    btn.style.opacity = "0.7";
  } else {
    btn.innerText = "Mark Done ✔";
    btn.style.opacity = "1";
  }
  
  // Optional: auto-hide after a few seconds
  setTimeout(() => {
    btn.innerText = "Mark Done ✔";
    btn.style.opacity = "1";
  }, 2000);
}

function toggleMode(){
  if(!currentDeck) return;
  const deck=data.decks[currentDeck];
  deck.mode = deck.mode==="shuffle" ? "sequential":"shuffle";
  save();
  alert("Mode: "+deck.mode);
}

function restartDeck(){
  startSession();
}

function startSession() {
  const deck = data.decks[currentDeck];
  const showBtn = document.getElementById("showBtn");
  showBtn.innerText = "Show Question";
  showBtn.onclick = handleShow;               
  showBtn.style.display = "block";

  // Ensure originalCards is available before resetting
  if (!deck.originalCards || !Array.isArray(deck.originalCards)) {
    console.error("Error: originalCards is not properly initialized.");
    return;
  }

  // If the deck was completed previously, we will reset it with the original cards
  if (deck.completed) {
    deck.cards = [...deck.originalCards]; // Reset to the full deck from originalCards
    deck.completed = false;               // Mark the deck as not completed
  }

  currentIndex = 0;
  repeatQueue = []; // Reset the repeat queue (incorrect answers)
  showingAnswer = false;
  firstShow = true;
  
  // Set up the card display
  document.getElementById("card").innerText = 'Tap “Show Question” to begin';
  document.getElementById("showBtn").innerText = "Show Question";
  document.getElementById("showBtn").style.display = "block";
  document.getElementById("correctBtn").style.display = "none";
  document.getElementById("incorrectBtn").style.display = "none";

  renderDecks();   // ← ensures highlight updates if coming from restart/complete
  renderCardList();
  const markBtn = document.getElementById("markDoneBtn");
  markBtn.style.display = "none";
  markBtn.innerText = "Mark Done ✔";
  markBtn.style.opacity = "1";
  updateBackButton();
  updateCardCounter();

}

function handleShow(){
  if(!currentDeck) return;
  const deck=data.decks[currentDeck];
  if(deck.cards.length===0){
    document.getElementById("card").innerText="No cards.";
    return;
  }

  if(firstShow){
    showQuestion();
    firstShow=false;
  } else if(!showingAnswer){
    showAnswer();
  }
}

function showQuestion(){
  const deck=data.decks[currentDeck];
  let cards=deck.cards;
  if(deck.mode==="shuffle"){
    currentIndex=Math.floor(Math.random()*cards.length);
  }
  const card=cards[currentIndex];
  let questionHtml = nl2br(card.q);   // assuming you have nl2br from before
  document.getElementById("card").innerHTML = 
    '<div class="inner">' + questionHtml + '</div>' +
    (card.img ? '<br><img src="' + card.img + '">' : "");
  document.getElementById("showBtn").innerText="Show Answer";
  showingAnswer=false;
  updateBackButton();
  updateCardCounter();
}

function showAnswer(){
  const deck=data.decks[currentDeck];
  const card=deck.cards[currentIndex];
  let answerHtml = nl2br(card.a);
  document.getElementById("card").innerHTML = 
    '<div class="inner">' + answerHtml + '</div>' +
    (card.img ? '<br><img src="' + card.img + '">' : "");
  document.getElementById("showBtn").style.display="none";
  document.getElementById("correctBtn").style.display="block";
  document.getElementById("incorrectBtn").style.display="block";
  showingAnswer=true;
  updateBackButton();
  updateCardCounter();
}

function grade(correct) {
  const deck = data.decks[currentDeck];
  if (!correct) {
    repeatQueue.push(deck.cards[currentIndex]); // Add incorrect cards to repeatQueue
  }

  document.getElementById("correctBtn").style.display = "none";
  document.getElementById("incorrectBtn").style.display = "none";
  document.getElementById("showBtn").style.display = "block";
  document.getElementById("showBtn").innerText = "Show Answer";

  currentIndex++;

// Check if all cards are done
  if (currentIndex >= deck.cards.length) {
    if (repeatQueue.length > 0) {
      deck.cards = repeatQueue;
      repeatQueue = [];
      currentIndex = 0;
      showQuestion();
    } else {
      deck.completed = true;
      document.getElementById("card").innerHTML = 
        '<strong>Deck Complete!</strong><br><br>';
      
      // Change button to "Restart Deck"
      const showBtn = document.getElementById("showBtn");
      showBtn.innerText = "Restart Deck";
      showBtn.onclick = restartDeck;           // ← override the click handler
      
      // Make sure other buttons are hidden
      document.getElementById("correctBtn").style.display = "none";
      document.getElementById("incorrectBtn").style.display = "none";
      showBtn.style.display = "block";
      document.getElementById("markDoneBtn").style.display = "block";
      
      return;
    }
  }

  showQuestion();
  showingAnswer = false;
  updateBackButton();
  updateCardCounter();
}


function parseCSV(text) {
  const rows = [];
  let row = [];
  let field = '';
  let inQuotes = false;
  let i = 0;

  // Add a sentinel newline at the end to flush the last field/row
  text += '\n';

  while (i < text.length) {
    const char = text[i];
    const next = text[i + 1] || '';

    if (char === '"' && inQuotes && next === '"') {
      // Escaped quote inside quoted field → keep one "
      field += '"';
      i += 2;
      continue;
    }

    if (char === '"') {
      inQuotes = !inQuotes;
      i++;
      continue;
    }

    if (char === ',' && !inQuotes) {
      row.push(field.trim());
      field = '';
      i++;
      continue;
    }

    if ((char === '\n' || char === '\r') && !inQuotes) {
      // End of row (only if not inside quotes)
      if (char === '\r' && next === '\n') i++; // skip LF after CR
      row.push(field.trim());
      if (row.some(v => v !== '')) {   // skip completely empty rows
        rows.push(row);
      }
      row = [];
      field = '';
      i++;
      continue;
    }

    // Normal character
    field += char;
    i++;
  }

  // Final flush if file didn't end with newline
  if (field || row.length) {
    row.push(field.trim());
    if (row.some(v => v !== '')) {
      rows.push(row);
    }
  }

  return rows;
}

function importCSV() {
  const files = document.getElementById("csvFile").files;
  if (!files || files.length === 0) {
    alert("No files selected.");
    return;
  }

  let importedCount = 0;
  let errors = [];

  // Process each file sequentially (to avoid race conditions with save())
  Array.from(files).forEach((file, idx) => {
    if (!file.name.toLowerCase().endsWith(".csv")) {
      errors.push(`Skipped ${file.name} — not a .csv file`);
      return;
    }

    // Derive deck name from filename (remove .csv, clean up)
    let deckName = file.name
      .replace(/\.csv$/i, "")
      .replace(/_/g, " ")
      .trim();

    if (!deckName) {
      deckName = `Imported Deck ${importedCount + 1}`;
    }

    // Initialize deck if it doesn't exist
    if (!data.decks[deckName]) {
      data.decks[deckName] = {
        cards: [],
        originalCards: [],
        mode: "sequential",
        done: false,
        completed: false
      };
    }

    const deck = data.decks[deckName];

    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const rows = parseCSV(e.target.result);

        rows.forEach(r => {
          if (r.length >= 2 && (r[0].trim() || r[1].trim())) {
            const card = { q: r[0], a: r[1], img: null };
            deck.cards.push(card);
            deck.originalCards.push(card);
          }
        });

        importedCount++;
        save();  // save after each file — safe but can be batched if many files

        // Final feedback after all files are done
        if (importedCount + errors.length === files.length) {
          finishImport();
        }
      } catch (err) {
        errors.push(`Error in ${file.name}: ${err.message}`);
        if (importedCount + errors.length === files.length) {
          finishImport();
        }
      }
    };

    reader.onerror = () => {
      errors.push(`Failed to read ${file.name}`);
      if (importedCount + errors.length === files.length) {
        finishImport();
      }
    };

    reader.readAsText(file);
  });

  function finishImport() {
    renderDecks();
    document.getElementById("csvFile").value = ""; // clear input

    let msg = `Successfully imported ${importedCount} deck${importedCount === 1 ? "" : "s"}.`;
    if (errors.length > 0) {
      msg += `\n\nErrors:\n${errors.join("\n")}`;
    }
    alert(msg);
  }
}

function exportCurrentDeck() {
  if (!currentDeck) {
    alert("No deck selected.");
    return;
  }

  const deck = data.decks[currentDeck];
  if (deck.cards.length === 0) {
    alert("This deck has no cards to export.");
    return;
  }

  // Build CSV content
  let csvContent = "Question,Answer\n"; // header

  deck.cards.forEach(card => {
    // Escape quotes and wrap fields in quotes
    const question = `"${card.q.replace(/"/g, '""')}"`;
    const answer   = `"${card.a.replace(/"/g, '""')}"`;
    csvContent += `${question},${answer}\n`;
  });

  // Create Blob and trigger download
  const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
  const url = URL.createObjectURL(blob);

  const link = document.createElement("a");
  link.setAttribute("href", url);
  link.setAttribute("download", `${currentDeck.replace(/[^a-z0-9]/gi, ' ')}.csv`);
  link.style.display = "none";
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);

  // Clean up
  URL.revokeObjectURL(url);

  // Optional feedback
  alert(`Exported "${currentDeck}" (${deck.cards.length} cards)`);
}

function toggleEditSection() {
  const section = document.querySelector(".collapsible-section");
  section.classList.toggle("open");
  
  // Optional: refresh card list when opening (in case deck changed)
  if (section.classList.contains("open")) {
    renderCardList();
  }
}

function addCard() {
  if (!currentDeck) return;
  const q = document.getElementById("newQ").value;
  const a = document.getElementById("newA").value;
  const imgFile = document.getElementById("newImg").files[0];

  const card = { q, a, img: null };

  if (imgFile) {
    const reader = new FileReader();
    reader.onload = e => {
      card.img = e.target.result;
      const deck = data.decks[currentDeck];
      deck.cards.push(card);
      deck.originalCards.push(card); // Save a copy of the original card
      save();
      renderDecks();
    };
    reader.readAsDataURL(imgFile);
  } else {
    const deck = data.decks[currentDeck];
    deck.cards.push(card);
    deck.originalCards.push(card); // Save a copy of the original card
    save();
    renderDecks();
    renderCardList();
  }
}

function saveEdit() {
  if (!currentDeck || editingIndex === null) return;

  const deck = data.decks[currentDeck];
  const newQ = document.getElementById("editQ").value.trim();
  const newA = document.getElementById("editA").value.trim();
  const imgFile = document.getElementById("editImg").files[0];

  if (!newQ || !newA) {
    alert("Question and Answer cannot be empty.");
    return;
  }

  // Update the card
  deck.cards[editingIndex].q = newQ;
  deck.cards[editingIndex].a = newA;

  if (imgFile) {
    const reader = new FileReader();
    reader.onload = e => {
      deck.cards[editingIndex].img = e.target.result;
      finishSave();
    };
    reader.readAsDataURL(imgFile);
  } else {
    finishSave();
  }

  function finishSave() {
    // Also update originalCards at same index (assuming parallel arrays)
    if (deck.originalCards && deck.originalCards[editingIndex]) {
      deck.originalCards[editingIndex] = { ...deck.cards[editingIndex] };
    }

    save();
    renderCardList();                // refresh list
    document.getElementById("editor").style.display = "none";
    editingIndex = null;             // clear editing state
    alert("Card updated.");
  }
}

function deleteCard() {
  if (!currentDeck || editingIndex === null) return;

  if (!confirm("Delete this card permanently?")) return;

  const deck = data.decks[currentDeck];

  deck.cards.splice(editingIndex, 1);
  if (deck.originalCards) {
    deck.originalCards.splice(editingIndex, 1);
  }

  save();
  renderCardList();
  document.getElementById("editor").style.display = "none";
  editingIndex = null;

  // Optional: restart session to avoid index errors
  startSession();

  alert("Card deleted.");
}

function cancelEdit() {
  // Hide the editor
  document.getElementById("editor").style.display = "none";
  
  // Clear the editing state
  editingIndex = null;
  
  // Optional: clear the form fields (good UX, prevents confusion)
  document.getElementById("editQ").value = "";
  document.getElementById("editA").value = "";
  document.getElementById("editImg").value = "";  // resets file input
}

renderDecks();

if (!currentDeck && Object.keys(data.decks).length > 0) {
  currentDeck = Object.keys(data.decks)[0];  // auto-select first deck
  startSession();
}

</script>

</html>
